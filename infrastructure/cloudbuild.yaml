# Velync — Cloud Build config for staging deployment
# Trigger: push to main branch OR manual submission.
#
# Prerequisites:
#   1. Create a Cloud Run service named "velync-staging" in your GCP project
#   2. Set all env vars from staging-env-template.sh in the Cloud Run service
#   3. Ensure the Cloud Run service account has:
#      - roles/datastore.user (Firestore access)
#      - roles/aiplatform.user (Vertex AI / Gemini)
#      - roles/logging.logWriter (Cloud Logging)
#      - roles/run.viewer (for revision URLs)
steps:
  # Build the container
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/velync-staging/velync-staging:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/velync-staging/velync-staging:latest
      - .

  # Push to Artifact Registry
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/velync-staging/velync-staging

  # Deploy to Cloud Run (staging)
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - velync-staging
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/velync-staging/velync-staging:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --min-instances=1
      - --max-instances=10
      - --concurrency=80
      - --cpu=1
      - --memory=512Mi
      - --timeout=300
      - --set-secrets=/etc/secrets/lemonsqueezy-api-key=lemonsqueezy-api-key:latest,/etc/secrets/lemonsqueezy-webhook-secret=lemonsqueezy-webhook-secret:latest
      - --update-env-vars=LOG_LEVEL=info,EXTERNAL_API_TIMEOUT=15000,PORT=8080

substitutions:
  _REGION: us-central1

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 600s
